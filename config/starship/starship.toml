# hypr-os starship prompt
#
# All colors use the 16 ANSI slots so the prompt automatically follows
# the terminal palette (kitty / ghostty / alacritty all get the same
# palette from theme.sh). No prompt-specific regen needed.

add_newline = true

format = """
[╭─](bright-black)\
[](fg:magenta)\
[  ](bg:magenta fg:black)\
[](bg:bright-black fg:magenta)\
$directory\
[](fg:bright-black bg:black)\
$git_branch\
$git_status\
[](fg:black)\
$fill\
$python$nodejs$rust$golang\
$cmd_duration\
$line_break\
[╰─](bright-black)\
$character"""

[fill]
symbol = " "

[character]
success_symbol = "[](bold cyan)[ ❯](bold green)"
error_symbol   = "[](bold red)[ ❯](bold red)"
vimcmd_symbol  = "[](bold yellow)[ ❮](bold yellow)"

[directory]
style              = "bg:bright-black fg:white bold"
format             = "[ $path ]($style)"
truncation_length  = 3
truncation_symbol  = "…/"
read_only          = " "
home_symbol        = " "

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = " "
"Pictures"  = " "
"Videos"    = " "
"dev"       = " "
".config"   = " "

[git_branch]
style  = "bg:black fg:magenta"
symbol = ""
format = "[  $symbol $branch ]($style)"

[git_status]
style  = "bg:black fg:yellow"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "="
ahead      = "⇡${count} "
behind     = "⇣${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = ""
untracked  = "?${count} "
stashed    = "\\$"
modified   = "!${count} "
staged     = "+${count} "
renamed    = "»${count} "
deleted    = "✘${count} "

[cmd_duration]
min_time = 1500
style    = "fg:yellow"
format   = "[ 󰔛 $duration]($style)"

[python]
style  = "fg:yellow"
symbol = " "
format = "[ $symbol($version) ]($style)"

[nodejs]
style  = "fg:green"
symbol = " "
format = "[ $symbol($version) ]($style)"

[rust]
style  = "fg:red"
symbol = " "
format = "[ $symbol($version) ]($style)"

[golang]
style  = "fg:cyan"
symbol = " "
format = "[ $symbol($version) ]($style)"
