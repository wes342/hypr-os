# hypr-os starship prompt -- self-contained powerline segments.
# Each module is a full "[][  text  ][]" block, so empty modules
# never break the powerline chain. Colors use ANSI names so the
# prompt follows whatever palette theme.sh applied to the terminal.

add_newline = true

format = """
$os\
$username\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$cmd_duration\
$fill\
$time\
$line_break\
$character"""

[fill]
symbol = " "

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"

# ── OS icon ──
[os]
disabled = false
style = "fg:bright-magenta"
format = "[](fg:bright-magenta)[$symbol](bg:bright-magenta fg:bright-white bold)[](fg:bright-magenta) "

[os.symbols]
Arch   = " 󰣇 "
Macos  = "  "
Linux  = "  "
Ubuntu = "  "
Fedora = "  "
Debian = "  "

# ── User ──
[username]
show_always = true
style_user  = "bg:magenta fg:bright-white bold"
style_root  = "bg:red fg:bright-white bold"
format      = "[](fg:magenta)[ $user ]($style)[](fg:magenta) "

# ── Directory ──
[directory]
style              = "bg:blue fg:bright-white bold"
format             = "[](fg:blue)[  $path ]($style)[](fg:blue) "
truncation_length  = 3
truncation_symbol  = "…/"
read_only          = "  "
home_symbol        = "~"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = " "
"Pictures"  = " "
"Videos"    = " "
"dev"       = " "
".config"   = " "

# ── Git ──
[git_branch]
style  = "bg:green fg:bright-white bold"
symbol = ""
format = "[](fg:green)[ $symbol $branch ](bg:green fg:bright-white bold)"

[git_status]
style  = "bg:green fg:bright-white bold"
format = '[$all_status$ahead_behind]($style)[](fg:green) '
conflicted = " ="
ahead      = " ⇡${count}"
behind     = " ⇣${count}"
diverged   = " ⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked  = " ?${count}"
stashed    = " \\$"
modified   = " !${count}"
staged     = " +${count}"
renamed    = " »${count}"
deleted    = " ✘${count}"

# ── Language versions ──
[python]
style  = "bg:yellow fg:black bold"
symbol = ""
format = "[](fg:yellow)[ $symbol $version ]($style)[](fg:yellow) "

[nodejs]
style  = "bg:yellow fg:black bold"
symbol = ""
format = "[](fg:yellow)[ $symbol $version ]($style)[](fg:yellow) "

[rust]
style  = "bg:yellow fg:black bold"
symbol = ""
format = "[](fg:yellow)[ $symbol $version ]($style)[](fg:yellow) "

[golang]
style  = "bg:yellow fg:black bold"
symbol = ""
format = "[](fg:yellow)[ $symbol $version ]($style)[](fg:yellow) "

# ── Duration ──
[cmd_duration]
min_time = 1500
style    = "bg:red fg:bright-white bold"
format   = "[](fg:red)[ 󰔛 $duration ]($style)[](fg:red) "

# ── Clock, right side ──
[time]
disabled = false
style  = "fg:bright-black"
format = "[ $time ]($style)"
time_format = "%H:%M"
