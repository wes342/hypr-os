# hypr-os starship prompt
#
# Powerline-style segments. All colors use ANSI names so the prompt
# automatically follows whatever palette kitty / ghostty / alacritty
# has been themed with via scripts/theme.sh.

add_newline = true

format = """
[ ](fg:bright-magenta)\
$os\
$username\
[](fg:bright-magenta bg:blue)\
$directory\
[](fg:blue bg:green)\
$git_branch\
$git_status\
[](fg:green bg:yellow)\
$python$nodejs$rust$golang\
[](fg:yellow bg:red)\
$cmd_duration\
[](fg:red)\
$fill\
$time\
$line_break\
$character"""

[fill]
symbol = " "

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"

[os]
disabled = false
style = "bg:bright-magenta fg:black bold"
format = "[ $symbol ]($style)"

[os.symbols]
Arch        = "󰣇"
Macos       = ""
Linux       = ""
Ubuntu      = ""
Fedora      = ""
Debian      = ""

[username]
show_always = true
style_user  = "bg:bright-magenta fg:black bold"
style_root  = "bg:red fg:black bold"
format      = "[ $user ]($style)"

[directory]
style              = "bg:blue fg:black bold"
format             = "[  $path ]($style)"
truncation_length  = 3
truncation_symbol  = "…/"
read_only          = "  "
home_symbol        = " ~"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = " "
"Pictures"  = " "
"Videos"    = " "
"dev"       = " "
".config"   = " "

[git_branch]
style  = "bg:green fg:black bold"
symbol = ""
format = "[ $symbol $branch ]($style)"

[git_status]
style  = "bg:green fg:black"
format = '[$all_status$ahead_behind]($style)'
conflicted = "="
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked  = " ?${count}"
stashed    = " \\$"
modified   = " !${count}"
staged     = " +${count}"
renamed    = " »${count}"
deleted    = " ✘${count}"

[python]
style  = "bg:yellow fg:black bold"
symbol = ""
format = "[ $symbol $version ]($style)"

[nodejs]
style  = "bg:yellow fg:black bold"
symbol = ""
format = "[ $symbol $version ]($style)"

[rust]
style  = "bg:yellow fg:black bold"
symbol = ""
format = "[ $symbol $version ]($style)"

[golang]
style  = "bg:yellow fg:black bold"
symbol = ""
format = "[ $symbol $version ]($style)"

[cmd_duration]
min_time = 1500
style    = "bg:red fg:black bold"
format   = "[ 󰔛 $duration ]($style)"

[time]
disabled = false
style  = "fg:bright-black"
format = "[ $time ]($style)"
time_format = "%H:%M"
