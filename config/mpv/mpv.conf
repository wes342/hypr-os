# Video output — gpu-next with Vulkan for best Wayland + Nvidia performance
vo=gpu-next
gpu-api=vulkan
hwdec=auto-safe

# Window behavior
force-window=yes
keep-open=yes
autofit-larger=90%x90%

# OSD
osd-font="Iosevka Nerd Font"
osd-font-size=28

# Audio
volume=80
volume-max=150

# Screenshots (Super+s in mpv)
screenshot-directory=~/Pictures/Screenshots
screenshot-format=png

# YouTube / streaming (yt-dlp)
ytdl-format=bestvideo[height<=?1440]+bestaudio/best
