# ┌──────────────────────────────────────────┐
# │          Environment Variables           │
# └──────────────────────────────────────────┘

set $gnome-schema org.gnome.desktop.interface

exec systemctl --user import-environment DISPLAY WAYLAND_DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE
exec dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY SWAYSOCK XDG_CURRENT_DESKTOP XDG_SESSION_DESKTOP XDG_SESSION_TYPE

setenv XCURSOR_SIZE 24
setenv LIBVA_DRIVER_NAME nvidia
setenv __GLX_VENDOR_LIBRARY_NAME nvidia
setenv NVD_BACKEND direct
setenv WLR_NO_HARDWARE_CURSORS 1
setenv GDK_BACKEND wayland,x11,*
setenv QT_QPA_PLATFORM "wayland;xcb"
setenv QT_AUTO_SCREEN_SCALE_FACTOR 1
setenv QT_WAYLAND_DISABLE_WINDOWDECORATION 1
setenv SDL_VIDEODRIVER wayland
setenv CLUTTER_BACKEND wayland
setenv XDG_CURRENT_DESKTOP sway
setenv XDG_SESSION_TYPE wayland
setenv XDG_SESSION_DESKTOP sway
setenv MOZ_ENABLE_WAYLAND 1
setenv ELECTRON_OZONE_PLATFORM_HINT auto
setenv GTK_THEME Adwaita:dark
setenv QT_STYLE_OVERRIDE Adwaita-Dark
