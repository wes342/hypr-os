# ┌──────────────────────────────────────────┐
# │              Autostart Apps              │
# └──────────────────────────────────────────┘

exec_always ~/.config/waybar/scripts/metrics-daemon.sh
exec_always sh -c 'pkill -x waybar; waybar -c ~/.config/waybar/config-sway.jsonc'
exec_always ~/.config/sway/scripts/wallpaper.sh --restore

# Eww sensor panel (fullscreen on HDMI-A-2)
exec sleep 2 && ~/.config/sway/scripts/sensor-panel.sh

# Notifications
exec mako

# Idle and lock
exec swayidle -w \
    timeout 300 'swaymsg "output * dpms off"' \
    resume 'swaymsg "output * dpms on"' \
    timeout 600 'swaylock -f' \
    timeout 1800 'systemctl suspend' \
    before-sleep 'swaylock -f'

# Clipboard (wl-copy/wl-paste)
exec wl-paste --type text --watch cliphist store
exec wl-paste --type image --watch cliphist store

# Polkit agent (needed for privilege escalation prompts)
exec /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Dark mode for XDG portal / Flatpak apps / Firefox
exec gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'

# Pre-warm app launcher (optional -- saves ~215MB RAM when disabled)
# exec sleep 3 && python3 ~/dev/hypr-os/scripts/launcher-app.py --hidden
