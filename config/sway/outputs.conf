# ┌──────────────────────────────────────────┐
# │              Monitor Config              │
# └──────────────────────────────────────────┘
# Primary: LG ULTRAGEAR 32" 1440p 180Hz

output DP-3 resolution 2560x1440@180Hz position 0 0 scale 1 adaptive_sync on

# Sensor panel: ZeroMOD 8" (native 480x1920, rotated to 1920x480)
# Positioned away from the primary so the pointer does not naturally cross.
output HDMI-A-2 resolution 480x1920@60Hz position 0 5000 scale 1 transform 270

# If a fresh install exposes different output names, Sway will keep its
# preferred defaults. Run `swaymsg -t get_outputs` and update this file.
