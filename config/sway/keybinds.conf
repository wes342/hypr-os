# ┌──────────────────────────────────────────┐
# │              Keybindings                 │
# └──────────────────────────────────────────┘

# ── Apps ──────────────────────────────────
bindsym $mod+Return exec $terminal
bindsym $mod+w exec $browser
bindsym $mod+e exec $fileManager
bindsym $mod+space exec ~/.config/sway/scripts/launcher.sh
bindsym $mod+q kill
bindsym $mod+Shift+q exec ~/.config/sway/scripts/kill-window.sh --force
bindsym $mod+m exec ~/.config/sway/scripts/powermenu.sh

# ── Window Management ─────────────────────
bindsym $mod+f exec swaymsg 'fullscreen disable; floating disable; resize set width 100 ppt height 100 ppt'
bindsym $mod+Mod1+f fullscreen toggle
bindsym $mod+v floating toggle
bindsym $mod+p sticky toggle
bindsym $mod+j layout toggle split
bindsym $mod+t layout toggle split tabbed stacking

# ── Focus ─────────────────────────────────
bindsym $mod+Left focus left
bindsym $mod+Right focus right
bindsym $mod+Up focus up
bindsym $mod+Down focus down

# ── Move Windows ──────────────────────────
bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Right move right
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Down move down

# ── Resize Windows ────────────────────────
bindsym $mod+Ctrl+Left resize shrink width 40px
bindsym $mod+Ctrl+Right resize grow width 40px
bindsym $mod+Ctrl+Up resize shrink height 40px
bindsym $mod+Ctrl+Down resize grow height 40px

# ── Workspaces ────────────────────────────
set $ws1 "1"
set $ws2 "2"
set $ws3 "3"
set $ws4 "4"
set $ws5 "5"
set $ws6 "6"
set $ws7 "7"
set $ws8 "8"
set $ws9 "9"
set $ws10 "10"

bindsym $mod+1 workspace number $ws1
bindsym $mod+2 workspace number $ws2
bindsym $mod+3 workspace number $ws3
bindsym $mod+4 workspace number $ws4
bindsym $mod+5 workspace number $ws5
bindsym $mod+6 workspace number $ws6
bindsym $mod+7 workspace number $ws7
bindsym $mod+8 workspace number $ws8
bindsym $mod+9 workspace number $ws9
bindsym $mod+0 workspace number $ws10

bindsym $mod+Shift+1 move container to workspace number $ws1
bindsym $mod+Shift+2 move container to workspace number $ws2
bindsym $mod+Shift+3 move container to workspace number $ws3
bindsym $mod+Shift+4 move container to workspace number $ws4
bindsym $mod+Shift+5 move container to workspace number $ws5
bindsym $mod+Shift+6 move container to workspace number $ws6
bindsym $mod+Shift+7 move container to workspace number $ws7
bindsym $mod+Shift+8 move container to workspace number $ws8
bindsym $mod+Shift+9 move container to workspace number $ws9
bindsym $mod+Shift+0 move container to workspace number $ws10

# ── Scratchpad ────────────────────────────
bindsym $mod+s scratchpad show
bindsym $mod+Shift+s move scratchpad

# ── Mouse ─────────────────────────────────
bindsym $mod+button4 workspace next
bindsym $mod+button5 workspace prev
floating_modifier $mod normal

# ── Wallpaper / Theme ─────────────────────
bindsym $mod+b exec ~/.config/sway/scripts/wallpaper.sh
bindsym $mod+Mod1+b exec ~/.local/bin/hypr-wallpaper
bindsym $mod+Mod1+e exec ~/.config/sway/scripts/eye-candy.sh
bindsym $mod+Mod1+s exec ~/.config/sway/scripts/snapper-menu.sh
bindsym $mod+Mod1+space exec python3 ~/dev/hypr-os/scripts/settings-app.py

# ── Keybind Cheatsheet ───────────────────
bindsym $mod+k exec $HOME/dev/hypr-os/scripts/keybinds.sh

# ── Session ───────────────────────────────
bindsym $mod+l exec swaylock -f
bindsym $mod+Shift+r reload
bindsym $mod+Ctrl+r exec sh -c 'pkill -x waybar; waybar -c ~/.config/waybar/config-sway.jsonc'

# ── Screenshots ──────────────────────────
bindsym Print exec ~/.config/sway/scripts/screenshot.sh region
bindsym $mod+Print exec ~/.config/sway/scripts/screenshot.sh fullscreen
bindsym $mod+Shift+Print exec ~/.config/sway/scripts/screenshot.sh window
bindsym Ctrl+Print exec ~/.config/sway/scripts/screenshot.sh region clip
bindsym $mod+Ctrl+Print exec ~/.config/sway/scripts/screenshot.sh fullscreen clip
bindsym $mod+Ctrl+Shift+Print exec ~/.config/sway/scripts/screenshot.sh window clip

# ── Sensor Panel Brightness ───────────────
bindsym $mod+bracketleft exec ~/.config/sway/scripts/sensor-brightness.sh down
bindsym $mod+bracketright exec ~/.config/sway/scripts/sensor-brightness.sh up
bindsym $mod+Shift+bracketright exec ~/.config/sway/scripts/sensor-brightness.sh reset

# ── Color Picker ──────────────────────────
bindsym $mod+c exec grim -g "$(slurp -p)" -t ppm - | magick ppm:- -format '%[pixel:p{0,0}]' txt:- | sed -n 's/.*#\\([0-9A-Fa-f]\\{6\\}\\).*/#\\1/p' | wl-copy && notify-send -t 2000 "Color Picker" "$(wl-paste)"

# ── Screen Recording ─────────────────────
bindsym $mod+Mod1+r exec ~/.config/sway/scripts/screen-record.sh
bindsym $mod+Mod1+Shift+r exec ~/.config/sway/scripts/screen-record.sh region

# ── Media Keys ────────────────────────────
bindsym XF86AudioRaiseVolume exec wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindsym XF86AudioLowerVolume exec wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindsym XF86AudioMute exec wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindsym XF86AudioMicMute exec ~/.config/sway/scripts/mic-toggle.sh
bindsym F24 exec ~/.config/sway/scripts/mic-toggle.sh
bindsym XF86AudioNext exec playerctl next
bindsym XF86AudioPause exec playerctl play-pause
bindsym XF86AudioPlay exec playerctl play-pause
bindsym XF86AudioPrev exec playerctl previous
