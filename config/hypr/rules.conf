# ┌──────────────────────────────────────────┐
# │           Window & Workspace Rules       │
# └──────────────────────────────────────────┘

# ── General Rules ─────────────────────────
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# ── Floating Windows ─────────────────────
windowrule {
    name = float-thunar-dialogs
    match:class = thunar
    match:title = ^(File Operation Progress|Confirm)
    float = true
    size = 500 300
    center = true
}

windowrule {
    name = float-steam-friends
    match:class = ^(steam)$
    match:title = ^(Friends List|Steam Settings)
    float = true
}

windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol|org.pulseaudio.pavucontrol)$
    float = true
    size = 800 500
    center = true
}

windowrule {
    name = float-eye-candy
    match:class = ^(eye-candy)$
    float = true
    size = 900 600
    center = true
    opacity = 0.85 override 0.85 override
}

windowrule {
    name = float-wallpaper-manager
    match:class = ^(dev.hypros.wallpaper-manager)$
    float = true
    size = 1400 850
    center = true
}

windowrule {
    name = float-pwvucontrol
    match:class = ^(com.saivert.pwvucontrol|pwvucontrol)$
    float = true
    size = 720 540
    center = true
}

# ── Opacity Overrides ─────────────────────
# Only games should be forced fully opaque
# Everything else respects the global active_opacity/inactive_opacity
windowrule {
    name = opaque-steam-game
    match:class = ^(steam_app_.*)$
    opacity = 1.0 override 1.0 override
    fullscreen = true
}

windowrule {
    name = opaque-gamescope
    match:class = ^(gamescope)$
    opacity = 1.0 override 1.0 override
    fullscreen = true
}

# ── Rofi ──────────────────────────────────
windowrule {
    name = rofi-launcher
    match:class = ^(Rofi)$
    float = true
    opacity = 1.0 override 1.0 override
}

