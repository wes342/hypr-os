# ┌──────────────────────────────────────────┐
# │           Window & Workspace Rules       │
# └──────────────────────────────────────────┘

# ── General Rules ─────────────────────────
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# fix-xwayland-drags rule removed — it blocked input to
# yabridge/Wine plugin windows which also have empty class+title

# ── Floating Windows ─────────────────────
windowrule {
    name = float-thunar-dialogs
    match:class = thunar
    match:title = ^(File Operation Progress|Confirm)
    float = true
    size = 500 300
    center = true
}

windowrule {
    name = float-steam-friends
    match:class = ^(steam)$
    match:title = ^(Friends List|Steam Settings)
    float = true
}

windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol|org.pulseaudio.pavucontrol)$
    float = true
    size = 800 500
    center = true
}

windowrule {
    name = float-eye-candy
    match:class = ^(eye-candy)$
    float = true
    size = 900 600
    center = true
    opacity = 0.85 override 0.85 override
}

windowrule {
    name = blur-rofi
    match:class = ^(Rofi)$
    opacity = 0.92 override 0.92 override
}

windowrule {
    name = float-wallpaper-manager
    match:class = ^(dev.hypros.wallpaper-manager)$
    float = true
    size = 1400 850
    center = true
}

windowrule {
    name = float-pwvucontrol
    match:class = ^(com.saivert.pwvucontrol|pwvucontrol)$
    float = true
    size = 720 540
    center = true
}

# ── Opacity Overrides ─────────────────────
# Only games should be forced fully opaque
# Everything else respects the global active_opacity/inactive_opacity
windowrule {
    name = opaque-steam-game
    match:class = ^(steam_app_.*)$
    opacity = 1.0 override 1.0 override
    fullscreen = true
}

windowrule {
    name = opaque-gamescope
    match:class = ^(gamescope)$
    opacity = 1.0 override 1.0 override
    fullscreen = true
}

# ── Rofi ──────────────────────────────────
windowrule {
    name = rofi-launcher
    match:class = ^(Rofi)$
    float = true
    opacity = 1.0 override 1.0 override
}

# ── Settings ─────────────────────────────
windowrule {
    name = settings-app
    match:class = ^(dev.hypros.settings)$
    float = true
    center = true
    opacity = 1.0 override 1.0 override
}

# ── App Launcher ─────────────────────────
windowrule {
    name = app-launcher
    match:class = ^(dev.hypros.launcher)$
    float = true
    center = true
}

# To pin workspaces to a specific monitor, run `hyprctl monitors`
# and add rules like:
#   workspace = 1, monitor:DP-3, default:true

