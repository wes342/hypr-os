# ┌──────────────────────────────────────────┐
# │           Window & Workspace Rules       │
# └──────────────────────────────────────────┘

# ── General Rules ─────────────────────────
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# ── Floating Windows ─────────────────────
windowrule {
    name = float-thunar-dialogs
    match:class = thunar
    match:title = ^(File Operation Progress|Confirm)
    float = true
    size = 500 300
    center = true
}

windowrule {
    name = float-steam-friends
    match:class = ^(steam)$
    match:title = ^(Friends List|Steam Settings)
    float = true
}

windowrule {
    name = float-pavucontrol
    match:class = ^(pavucontrol|org.pulseaudio.pavucontrol)$
    float = true
    size = 800 500
    center = true
}

# ── Opacity Overrides ─────────────────────
# Apps that should always be opaque (media, gaming)
windowrule {
    name = opaque-firefox
    match:class = ^(firefox)$
    opacity = 1.0 override 1.0 override
}

windowrule {
    name = opaque-steam-game
    match:class = ^(steam_app_.*)$
    opacity = 1.0 override 1.0 override
    fullscreen = true
}

windowrule {
    name = opaque-gamescope
    match:class = ^(gamescope)$
    opacity = 1.0 override 1.0 override
    fullscreen = true
}

