# ┌──────────────────────────────────────────┐
# │            Look and Feel                 │
# └──────────────────────────────────────────┘

general {
    gaps_in = 4
    gaps_out = 4
    border_size = 2
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 5
    rounding_power = 2

    # Focused = opaque, unfocused = slightly transparent
    active_opacity = 1.0
    inactive_opacity = 0.85

    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(00000055)
    }

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
        ignore_opacity = true
        xray = false
    }
}

animations {
    enabled = true

    bezier = snappy, 0.05, 0.9, 0.1, 1.0
    bezier = smooth, 0.25, 0.1, 0.25, 1.0
    bezier = slide, 0.15, 0, 0.1, 1

    animation = windows, 1, 4, snappy, popin 80%
    animation = windowsOut, 1, 3, smooth, popin 80%
    animation = fade, 1, 4, smooth
    animation = workspaces, 1, 4, slide, slide
    animation = border, 1, 5, smooth
    animation = borderangle, 1, 30, smooth, loop
}

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    vrr = 1
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace
