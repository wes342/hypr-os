# ┌──────────────────────────────────────────┐
# │              Monitor Config              │
# └──────────────────────────────────────────┘
# Fresh installs should let Hyprland use preferred output defaults.
# To pin hardware-specific layout later, run:
#   hyprctl monitors
# Then add lines like:
#   monitor = DP-3, 2560x1440@180, 0x0, 1, vrr, 1
#   monitor = HDMI-A-2, 480x1920@60, 0x5000, 1, transform, 3

monitor = , preferred, auto, 1
