# ┌──────────────────────────────────────────┐
# │              Keybindings                 │
# └──────────────────────────────────────────┘

$mainMod = SUPER

# ── Apps ──────────────────────────────────
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, W, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, Space, exec, ~/.config/hypr/scripts/launcher.sh
bind = $mainMod, Q, exec, ~/.config/hypr/scripts/kill-window.sh
bind = $mainMod SHIFT, Q, exec, ~/.config/hypr/scripts/kill-window.sh --force
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# ── Window Management ─────────────────────
bind = $mainMod, F, fullscreen, 1
bind = $mainMod ALT, F, fullscreen, 0
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit

# Toggle layout: dwindle (tiled) ↔ scrolling
bind = $mainMod, T, exec, if [ "$(hyprctl getoption general:layout -j | jq -r '.str')" = "dwindle" ]; then hyprctl keyword general:layout scrolling && notify-send -t 2000 "Layout" "󰡃 Scrolling"; else hyprctl keyword general:layout dwindle && notify-send -t 2000 "Layout" " Tiled"; fi

# ── Focus ─────────────────────────────────
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# ── Move Windows ──────────────────────────
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# ── Resize Windows ────────────────────────
bind = $mainMod CTRL, left, resizeactive, -40 0
bind = $mainMod CTRL, right, resizeactive, 40 0
bind = $mainMod CTRL, up, resizeactive, 0 -40
bind = $mainMod CTRL, down, resizeactive, 0 40

# ── Workspaces ────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ── Scratchpad ────────────────────────────
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ── Mouse ─────────────────────────────────
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ── Wallpaper / Theme ─────────────────────
bind = $mainMod, B, exec, ~/.config/hypr/scripts/wallpaper.sh
bind = $mainMod ALT, B, exec, ~/.local/bin/hypr-wallpaper
bind = $mainMod ALT, E, exec, ~/.config/hypr/scripts/eye-candy.sh
bind = $mainMod ALT, S, exec, ~/.config/hypr/scripts/snapper-menu.sh

# ── Keybind Cheatsheet ───────────────────
bind = $mainMod, K, exec, $HOME/dev/hypr-os/scripts/keybinds.sh

# ── Session ───────────────────────────────
bind = $mainMod, L, exec, hyprlock
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod CTRL, R, exec, killall waybar; waybar &

# ── Screenshots ──────────────────────────
# Default: save to ~/Pictures/Screenshots, copy to clipboard, open satty.
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh region
bind = $mainMod, Print, exec, ~/.config/hypr/scripts/screenshot.sh fullscreen
bind = $mainMod SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh window
# Clipboard-only (no file saved, no annotation) -- add Ctrl.
bind = CTRL, Print, exec, ~/.config/hypr/scripts/screenshot.sh region clip
bind = $mainMod CTRL, Print, exec, ~/.config/hypr/scripts/screenshot.sh fullscreen clip
bind = $mainMod CTRL SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh window clip

# ── Sensor Panel Brightness ───────────────
bind = $mainMod, bracketdown, exec, ~/.config/hypr/scripts/sensor-brightness.sh down
bind = $mainMod, bracketup, exec, ~/.config/hypr/scripts/sensor-brightness.sh up
bind = $mainMod SHIFT, bracketup, exec, ~/.config/hypr/scripts/sensor-brightness.sh reset

# ── Color Picker ──────────────────────────
bind = $mainMod, C, exec, hyprpicker -a -f hex && notify-send -t 2000 "Color Picker" "$(wl-paste)" 2>/dev/null

# ── Screen Recording ─────────────────────
# Toggle recording: press once to start, again to stop
bind = $mainMod ALT, R, exec, ~/.config/hypr/scripts/screen-record.sh
bind = $mainMod ALT SHIFT, R, exec, ~/.config/hypr/scripts/screen-record.sh region

# ── Media Keys ────────────────────────────
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, ~/.config/hypr/scripts/mic-toggle.sh
# F24 (macro/programmable key) toggles mic mute globally. Needed
# because Wayland blocks Discord's in-app global keybind capture --
# mute at the OS level works for Discord, browsers, Mumble, etc.
bind   = , F24, exec, ~/.config/hypr/scripts/mic-toggle.sh
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
