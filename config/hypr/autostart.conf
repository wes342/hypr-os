# ┌──────────────────────────────────────────┐
# │              Autostart Apps              │
# └──────────────────────────────────────────┘

# System metrics daemon (powers waybar dropdowns)
exec-once = ~/.config/waybar/scripts/metrics-daemon.sh

# Bar and wallpaper
exec-once = waybar
exec-once = hyprpaper

# Eww sensor panel (fullscreen on HDMI-A-2)
# Uses sensor-panel.sh to detect correct monitor index at runtime
exec-once = sleep 2 && ~/.config/hypr/scripts/sensor-panel.sh

# Monitor guard: keeps windows off sensor panel on monitor hotplug/wake
exec-once = ~/.config/hypr/scripts/monitor-listener.sh

# Bluetooth tray applet (start manually if needed: blueman-applet)
# exec-once = blueman-applet

# Notifications
exec-once = mako

# Idle and lock
exec-once = hypridle

# Clipboard (wl-copy/wl-paste)
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Polkit agent (needed for privilege escalation prompts)
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# XDG portal
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# Dark mode for XDG portal / Flatpak apps / Firefox
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'

# Restore last wallpaper + theme (no random on boot)
exec-once = ~/.config/hypr/scripts/wallpaper.sh --restore

# Pre-warm app launcher (optional — saves ~215MB RAM when disabled)
# Enable via Settings menu (Super+ALT+Space) → Performance → Launcher Pre-warm
# exec-once = sleep 3 && python3 ~/dev/hypr-os/scripts/launcher-app.py --hidden
