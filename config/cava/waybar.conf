# Compact cava config for the waybar visualizer module.
# Outputs 10 bars as ASCII 0-7 to stdout; the wrapper script maps
# those digits to unicode block characters.

[general]
bars = 10
framerate = 30
autosens = 1
sensitivity = 100
sleep_timer = 2

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 7

[smoothing]
noise_reduction = 77
